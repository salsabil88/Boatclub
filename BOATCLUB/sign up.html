<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boat club</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Mulish:wght@200;300;400;500&family=Philosopher:wght@400;700&display=swap"
        rel="stylesheet">
    <script src="https://kit.fontawesome.com/a044e42615.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="boat.css">


</head>

<body>
    <iframe src="./nav.html" onload="this.before((this.contentDocument.body||this.contentDocument).children[0]);this.remove()"></iframe>
    <script src="boatclub.js"></script>

    <div class="part1">
        <div class="signup">
            <h1>sign up</h1>
        </div>
    </div>
    <div class="container1">
        <form class="form" id="form">
            <h2>create account</h2>
            <div class="form-control">
                <lable for="username">username</lable>
                <input type="text" id="username" placeholder="luhan99">
                <i class=" fa fa-solid fa-check"></i>
                <i class=" fa fa-solid fa-exclamation"></i>
                <small>error message</small>
            </div>
            <div class="form-control">
                <lable for="email">email</lable>
                <input type="email" id="email" placeholder="chimchim@gmail.com">
                <i class=" fa fa-solid fa-check"></i>
                <i class=" fa fa-solid fa-exclamation"></i>
                <small>error message</small>
            </div>
            <div class="form-control">
                <lable for="password">password</lable>
                <input type="password" id="password" placeholder="password">
                <i class=" fa fa-solid fa-check"></i>
                <i class=" fa fa-solid fa-exclamation"></i>
                <small>error message</small>
            </div>
            <div class="form-control">
                <lable for="confirm password">confirm password</lable>
                <input type="password2" id="confirm password" placeholder="confirm password">
                <i class=" fa fa-solid fa-check"></i>
                <i class=" fa fa-solid fa-exclamation"></i>
                <small>error message</small>
            </div>
            <button>submit</button>
        </form>
    </div>
    <div class="footer">
        <h1>get in touch </h1>
        <p>Lorem, ipsum dolor sit amet consectetur adipisicing elit.<br>Lorem ipsum dolor sit.</p>
        <div class="icon2">
            <i class="fa fa-brands fa-facebook"></i>
            <i class="fa fa-brands fa-twitter"></i>
            <i class="fa fa-brands fa-instagram"></i>
            <i class="fa fa-brands fa-pinterest"></i>
        </div>
    </div>
</body>

</html>
